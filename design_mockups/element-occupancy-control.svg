<svg width="720" height="760" viewBox="0 0 720 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="32" y1="28" x2="665" y2="735" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FCFF"/>
      <stop offset="1" stop-color="#E5F0FA"/>
    </linearGradient>
    <linearGradient id="occupancyScale" x1="0" y1="0" x2="0" y2="344" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DC2626"/>
      <stop offset="0.48" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="720" height="760" rx="42" fill="#0B1F34"/>
  <rect x="32" y="30" width="656" height="690" rx="34" fill="url(#panel)"/>
  <text x="80" y="106" fill="#395772" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="0.14em">OCCUPANCY CONTROL</text>
  <text x="80" y="184" fill="#071A30" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="700">Busy</text>
  <text x="80" y="230" fill="#476681" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600">Five fixed occupancy levels set directly on the slider</text>
  <rect x="518" y="258" width="80" height="344" rx="40" fill="#D5E4F2"/>
  <rect x="518" y="326" width="80" height="276" rx="40" fill="url(#occupancyScale)"/>
  <circle cx="558" cy="326" r="36" fill="#FFF6D7"/>
  <circle cx="558" cy="326" r="20" fill="#F59E0B"/>
  <circle cx="558" cy="288" r="7" fill="#F7FBFF"/>
  <circle cx="558" cy="366" r="7" fill="#F7FBFF" fill-opacity="0.92"/>
  <circle cx="558" cy="444" r="7" fill="#F7FBFF" fill-opacity="0.9"/>
  <circle cx="558" cy="522" r="7" fill="#F7FBFF" fill-opacity="0.88"/>
  <circle cx="558" cy="600" r="7" fill="#F7FBFF" fill-opacity="0.86"/>
  <text x="80" y="298" fill="#5A7690" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Full</text>
  <text x="80" y="376" fill="#5A7690" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Busy</text>
  <text x="80" y="454" fill="#5A7690" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Moderate</text>
  <text x="80" y="532" fill="#5A7690" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Sparse</text>
  <text x="80" y="610" fill="#5A7690" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Empty</text>
  <text x="80" y="670" fill="#071A30" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">Current selection: Busy</text>
  <text x="80" y="710" fill="#476681" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">The qualitative word sits below the control so the user never has to infer the level from color alone.</text>
</svg>
