name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.17
  geolocator: ^14.0.2
  google_maps_flutter: ^2.15.0
  noise_meter: ^5.1.0
  permission_handler: ^12.0.1
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/map_markers/animated/
    - assets/map_markers/static/
    - assets/data_collection/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#102A43"
  adaptive_icon_foreground: "assets/logo.png"
